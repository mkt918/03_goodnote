<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoodNote Web - PDFノートアプリ</title>
  <meta name="description" content="ブラウザで動くPDFノートアプリ。PDFに自由に書き込み、フォルダで管理。">

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'Noto Sans JP', 'sans-serif'],
          },
          colors: {
            primary: {
              50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe',
              300: '#a5b4fc', 400: '#818cf8', 500: '#6366f1',
              600: '#4f46e5', 700: '#4338ca', 800: '#3730a3', 900: '#312e81',
            }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- ヘッダー -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-30">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <!-- ロゴ -->
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 bg-primary-500 rounded-xl flex items-center justify-center shadow-md shadow-primary-200">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
            </svg>
          </div>
          <h1 class="text-xl font-bold text-gray-800 tracking-tight">GoodNote</h1>
        </div>

        <!-- アクション -->
        <div class="flex items-center gap-2">
          <button id="btn-new-blank" data-tooltip="白紙ノート作成"
            class="tool-btn p-2.5 rounded-xl text-gray-500 hover:text-primary-600">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
          </button>
          <button id="btn-upload" data-tooltip="PDFアップロード"
            class="tool-btn p-2.5 rounded-xl text-gray-500 hover:text-primary-600">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
            </svg>
          </button>
          <button id="btn-new-folder" data-tooltip="フォルダ作成"
            class="tool-btn p-2.5 rounded-xl text-gray-500 hover:text-primary-600">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 13h6m-3-3v6m-9 1V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
            </svg>
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- パンくずリスト -->
  <nav id="breadcrumb" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3">
    <div class="flex items-center gap-1 text-sm text-gray-500">
      <button class="breadcrumb-item font-medium hover:text-primary-600" data-folder-id="">
        📁 マイファイル
      </button>
    </div>
  </nav>

  <!-- メインコンテンツ -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-12">
    <!-- ドロップゾーン -->
    <div id="drop-zone" class="drop-zone rounded-2xl p-8 mb-6 text-center hidden">
      <svg class="w-12 h-12 mx-auto text-gray-400 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
      </svg>
      <p class="text-gray-500 font-medium">PDFファイルをドロップしてアップロード</p>
    </div>

    <!-- フォルダ一覧 -->
    <section id="folders-section" class="mb-8 hidden">
      <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">フォルダ</h2>
      <div id="folders-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3">
      </div>
    </section>

    <!-- ドキュメント一覧 -->
    <section id="documents-section">
      <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">ドキュメント</h2>
      <div id="documents-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
      </div>
    </section>

    <!-- 空状態 -->
    <div id="empty-state" class="empty-state text-center py-24 hidden">
      <div class="w-20 h-20 mx-auto mb-5 bg-gray-100 rounded-2xl flex items-center justify-center">
        <svg class="w-10 h-10 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
        </svg>
      </div>
      <h3 class="text-lg font-semibold text-gray-600 mb-2">ファイルがありません</h3>
      <p class="text-gray-400 mb-6 text-sm">PDFをアップロードするか、白紙ノートを作成してください</p>
      <div class="flex items-center justify-center gap-3">
        <button id="btn-empty-upload"
          class="px-5 py-2.5 bg-primary-500 text-white rounded-xl font-medium text-sm hover:bg-primary-600 transition-colors shadow-md shadow-primary-200">
          PDFアップロード
        </button>
        <button id="btn-empty-blank"
          class="px-5 py-2.5 bg-white text-gray-700 rounded-xl font-medium text-sm hover:bg-gray-50 transition-colors border border-gray-200">
          白紙ノート作成
        </button>
      </div>
    </div>
  </main>

  <!-- コンテキストメニュー -->
  <div id="context-menu" class="context-menu fixed bg-white rounded-xl shadow-xl border border-gray-100 py-1.5 z-50 min-w-[180px] hidden">
    <button class="ctx-item w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 flex items-center gap-2.5" data-action="open">
      <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
      </svg>
      開く
    </button>
    <button class="ctx-item w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 flex items-center gap-2.5" data-action="rename">
      <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
      </svg>
      名前を変更
    </button>
    <div class="border-t border-gray-100 my-1"></div>
    <button class="ctx-item w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50 flex items-center gap-2.5" data-action="delete">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
      </svg>
      削除
    </button>
  </div>

  <!-- フォルダ作成モーダル -->
  <div id="folder-modal" class="modal-overlay fixed inset-0 z-50 flex items-center justify-center hidden">
    <div class="modal-content bg-white rounded-2xl shadow-2xl p-6 w-full max-w-sm mx-4">
      <h3 class="text-lg font-semibold text-gray-800 mb-4">フォルダを作成</h3>
      <input id="folder-input" type="text"
        class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:border-primary-400 focus:ring-2 focus:ring-primary-100 outline-none text-sm"
        placeholder="フォルダ名を入力">
      <div class="flex justify-end gap-2 mt-5">
        <button id="folder-cancel"
          class="px-4 py-2 text-sm text-gray-600 hover:bg-gray-100 rounded-lg transition-colors">
          キャンセル
        </button>
        <button id="folder-confirm"
          class="px-4 py-2 text-sm bg-primary-500 text-white rounded-lg hover:bg-primary-600 transition-colors">
          作成
        </button>
      </div>
    </div>
  </div>

  <!-- リネームモーダル -->
  <div id="rename-modal" class="modal-overlay fixed inset-0 z-50 flex items-center justify-center hidden">
    <div class="modal-content bg-white rounded-2xl shadow-2xl p-6 w-full max-w-sm mx-4">
      <h3 class="text-lg font-semibold text-gray-800 mb-4">名前を変更</h3>
      <input id="rename-input" type="text"
        class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:border-primary-400 focus:ring-2 focus:ring-primary-100 outline-none text-sm"
        placeholder="新しい名前を入力">
      <div class="flex justify-end gap-2 mt-5">
        <button id="rename-cancel"
          class="px-4 py-2 text-sm text-gray-600 hover:bg-gray-100 rounded-lg transition-colors">
          キャンセル
        </button>
        <button id="rename-confirm"
          class="px-4 py-2 text-sm bg-primary-500 text-white rounded-lg hover:bg-primary-600 transition-colors">
          変更
        </button>
      </div>
    </div>
  </div>

  <!-- 隠しファイルインプット -->
  <input type="file" id="file-input" accept=".pdf" class="hidden" multiple>

  <script type="module" src="js/app.js"></script>
</body>
</html>
